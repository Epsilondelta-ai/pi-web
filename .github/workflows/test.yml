name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Frontend tests
        run: bun run test

      - name: Backend tests
        run: bun run backend:test

      - name: Backend coverage 100% check
        run: |
          go test ./backend/... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out > coverage_func.txt
          TOTAL=$(tail -1 coverage_func.txt | grep -oP '\d+\.\d+')
          echo "Total coverage: ${TOTAL}%"
          if [ "$TOTAL" != "100.0" ]; then
            echo "❌ Coverage is ${TOTAL}%, expected 100.0%"
            go tool cover -func=coverage.out | grep -v '100.0%'
            exit 1
          fi
          echo "✅ Coverage is 100%"

      - name: Build UI
        run: bun run build
