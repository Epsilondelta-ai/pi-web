name: Backend CI

on:
  pull_request:
    paths:
      - '.github/workflows/backend.yml'
      - '**/*.go'
      - 'backend/**'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/backend.yml'
      - '**/*.go'
      - 'backend/**'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test coverage
        run: go test $(go list ./... | grep -v '/node_modules/') -coverprofile=/tmp/piweb-cover.out -covermode=count >/tmp/piweb-go-test.log && go tool cover -func=/tmp/piweb-cover.out | tail -1 | grep '100.0%'
