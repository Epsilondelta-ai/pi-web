name: Frontend CI

on:
  pull_request:
    paths:
      - '.github/workflows/frontend.yml'
      - 'astro.config.ts'
      - 'bun.lock'
      - 'eslint.config.js'
      - 'package.json'
      - 'public/**'
      - 'src/**'
      - '.storybook/**'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend.yml'
      - 'astro.config.ts'
      - 'bun.lock'
      - 'eslint.config.js'
      - 'package.json'
      - 'public/**'
      - 'src/**'
      - '.storybook/**'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test coverage
        run: bun run test:coverage

      - name: Build UI
        run: bun run build

      - name: Build Storybook
        run: bun run build-storybook
