  <text x="342" y="342" fill="#D4D4D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"> class=</text>
  <text x="398" y="342" fill="#FAE870" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">"tree"</text>
  <text x="448" y="342" fill="#D4D4D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"> aria-label=</text>
