  <text x="346" y="278" fill="#D4D4D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"> class=</text>
  <text x="402" y="278" fill="#FAE870" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">"app"</text>
  <text x="446" y="278" fill="#D4D4D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"> data-route={initialRoute}&gt;</text>
  <text x="244" y="310" fill="#5A5A5A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">96</text>
  <text x="284" y="310" fill="#8AF6FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">&lt;section</text>
  <text x="356" y="310" fill="#D4D4D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"> class={bodyClass} data-view=</text>
  <text x="570" y="310" fill="#FAE870" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">"workspace"</text>
  <text x="244" y="342" fill="#5A5A5A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">161</text>
